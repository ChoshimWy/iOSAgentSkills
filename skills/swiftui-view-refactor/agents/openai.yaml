interface:
  display_name: "SwiftUI 视图重构"
  short_description: "重构既有 SwiftUI 视图文件并保留强制收尾门禁"
  default_prompt: "使用 $swiftui-view-refactor 重构已存在的 SwiftUI 视图文件，清理过长 body、错位状态与副作用；如果是新页面设计请改用 $swiftui-ui-patterns；若任务产出修改了 Apple Xcode 项目相关内容，收尾必须进入 $final-evidence-gate；证据不足、高风险或命中工程/依赖/签名/资源打包类改动时，再切到 $verify-ios-build 在目标项目的项目环境完成最终验证：iOS 项目若同时存在 `.xcworkspace` 与 `.xcodeproj` 必须优先 `.xcworkspace`，默认优先已连接真机，找不到连接中的真机时再回退到 simulator。"

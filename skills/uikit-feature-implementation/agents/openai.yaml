interface:
  display_name: "UIKit Feature 实现"
  short_description: "按既定架构落地 UIKit 页面实现并保留按需验证"
  default_prompt: "使用 $uikit-feature-implementation 在页面职责与架构边界已明确的前提下实现 UIKit 页面、布局与交互逻辑；无论 coder 是否由主 Agent 串行承担，实现完成后默认按三步收口：$uikit-feature-implementation -> $testing/定向验证 -> reviewer subAgent($code-review)，并且第三步必须由独立 reviewer subAgent 执行，不能由实现 Agent 自审；其中 $testing 阶段默认只执行最窄定向单测，若不新增测试代码或没有可低成本执行的单测路径，也要明确给出 `no_test_reason`、`suggested_validation` 与验证依据，不自动升级到真机 / 模拟器验证；随后由独立 reviewer subAgent 执行 $code-review，审查本次任务全量差异与直接影响面，没有 blocking findings 即可按默认标准收口。若任务产出修改了 Apple Xcode 项目相关内容，默认以定向测试/必要验证与独立 reviewer subAgent 执行的 $code-review 放行为收口；$final-evidence-gate / $verify-ios-build 仅在用户显式要求或需要补强完整项目环境证据时按需使用。"

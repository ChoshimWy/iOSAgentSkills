interface:
  display_name: "UIKit Feature 实现"
  short_description: "按既定架构落地 UIKit 页面实现并保留收尾门禁"
  default_prompt: "使用 $uikit-feature-implementation 在页面职责与架构边界已明确的前提下实现 UIKit 页面、布局与交互逻辑；如果当前任务未进入多 Agent 编排，或当前轮只能以单 Agent 执行，实现完成后默认也按固定四步收口：$uikit-feature-implementation -> $code-review -> $testing -> $verify-ios-build；其中 $testing 阶段若不新增测试代码，也要明确给出 no_test_reason 后再进入最终门禁。若任务产出修改了 Apple Xcode 项目相关内容，收尾必须切到 $verify-ios-build，并在目标项目的项目环境完成最终验证：iOS 项目若同时存在 `.xcworkspace` 与 `.xcodeproj` 必须优先 `.xcworkspace`，默认优先已连接真机，找不到连接中的真机时再回退到 simulator。"

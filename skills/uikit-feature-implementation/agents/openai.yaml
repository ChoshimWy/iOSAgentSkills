interface:
  display_name: "UIKit Feature 实现"
  short_description: "按既定架构落地 UIKit 页面实现并保留收尾门禁"
  default_prompt: "使用 $uikit-feature-implementation 在页面职责与架构边界已明确的前提下实现 UIKit 页面、布局与交互逻辑；若任务产出修改了 Apple Xcode 项目相关内容，收尾必须切到 $verify-ios-build，并在目标项目的项目环境完成最终验证：iOS 项目若同时存在 `.xcworkspace` 与 `.xcodeproj` 必须优先 `.xcworkspace`，默认优先已连接真机，找不到连接中的真机时再回退到 simulator。"

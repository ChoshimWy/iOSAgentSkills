interface:
  display_name: "iOS 运行时排障"
  short_description: "分析 crash、异常、泄漏与运行时根因并保留按需验证"
  default_prompt: "使用 $debugging 基于日志、调用栈、复现步骤和运行时症状定位当前 iOS 问题的根因；如果只是收尾编译验证、构建检查或跑一次 xcodebuild，请改用 $verify-ios-build；如果核心是 profiling 或 benchmark，请改用 $ios-performance；若任务产出修改了 Apple Xcode 项目相关内容，默认以定向测试/必要验证与 $code-review 放行为收口；$final-evidence-gate / $verify-ios-build 仅在用户显式要求或需要补强完整项目环境证据时按需使用。"

interface:
  display_name: "Codex 多 Agent 编排"
  short_description: "默认优先的 iOS 主 Skill 入口：按 lite/standard/full 协调实现、调试、性能、审查、测试与可选验证"
  default_prompt: "默认优先使用 $codex-subagent-orchestration 作为默认优先的自适应多 Agent 编排与 iOS 主 Skill 入口；本仓库将默认入口视为仓库级显式触发，Codex CLI 原生 subAgent 可用时按 lite / standard / full 自动使用 subAgent，再协调实现、调试、性能、审查、测试与按需补强验证；默认 testing 只执行最窄定向单测，真机 / 模拟器验证仅在用户显式要求、发布前、高风险或证据不足时按需进入 $final-evidence-gate / $verify-ios-build；仅在工具不可用、策略禁止或写集不适合并行时临时回退单 Agent。"

policy:
  allow_implicit_invocation: false

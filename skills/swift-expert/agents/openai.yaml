interface:
  display_name: "Swift 进阶开发"
  short_description: "处理复杂 Swift 并发隔离、类型擦除与可用性策略设计"
  default_prompt: "使用 $swift-expert 处理复杂 Swift 并发隔离、类型擦除、协议族设计和跨平台可用性策略问题；若任务产出修改了 Apple Xcode 项目相关内容，收尾必须切到 $verify-ios-build，并在目标项目的项目环境完成最终验证：iOS 项目若同时存在 `.xcworkspace` 与 `.xcodeproj` 必须优先 `.xcworkspace`，默认优先已连接真机，找不到连接中的真机时再回退到 simulator。"

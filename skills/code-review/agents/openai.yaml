interface:
  display_name: "iOS 代码审查"
  short_description: "审查 Swift / iOS diff、风险与 public API 设计"
  default_prompt: >-
    使用 $code-review 对当前 iOS / Swift 本次任务全量差异与直接影响面做静态审查；默认纳入 staged、unstaged、untracked，以及任务起点基线之后的相关提交，并在无法确认基线时声明 fallback。按严重度输出审查发现与风险，不把静态结论包装成已复现的运行时问题；把“关键注释缺失或误导”纳入阻塞判定：`public/open` API 缺中文 `///` 文档注释、并发/副作用/失败语义缺失、注释未默认使用中文或与实现冲突都应进入 `阻塞问题`。可见审查结果使用中文标签并包含 `审查范围`、`影响面`、`未审查变更`、`阻塞问题`、`非阻塞建议`、`首个失败`、`验证故事`、`审查独立性`、`风险等级`、`下一步`；其中 `阻塞问题` 只放真实阻塞项，无阻塞时写 `阻塞问题：无`、`未审查变更：none` 与 `首个失败：none`，且存在阻塞项时 `下一步` 不能是 `complete`。除非调用方明确要求机器可读 JSON，不要在可见回复中裸露 `blocking_findings` / `non_blocking_findings`。本阶段默认以独立 reviewer subAgent 身份执行；如果当前任务属于实现链路收口审查，必须由未参与实现的独立 reviewer subAgent 承接 定向验证 / no_test_reason 之后的第三步；同一 Agent 自审无效，无法确认独立性时输出 blocked；若 `ios-verification` 已执行最窄定向单测且本次改动未命中工程/依赖/签名/资源/设备能力高风险条件，不得仅因未跑真机 / 模拟器验证就判证据不足。若本次修改涉及私有库 / 私有组件，还必须审查验证与 review 是否保持主项目本地 `:path` 私有库依赖基线：仅当主项目尚未指向本地源码且需要验证私有库源码改动时才切到本地 `:path`；修改本地私有库源码仓并完成必要自测后，必须回主项目基于本地依赖验证与 review。私有库仓内自测不能替代主项目本地 `:path` 私有库依赖基线验证，验证通过后默认保持当前本地 `:path` 状态完成 review。未收到明确指令却使用线上版本化依赖或 `Pods/` 快照验证 / review，应视为验证基线不成立。若验证故事证据不足、高风险或存在未审查影响面，应建议进入 $ios-verification 补强验证或证据裁决。

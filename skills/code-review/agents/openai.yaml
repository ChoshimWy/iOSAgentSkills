interface:
  display_name: "iOS 代码审查"
  short_description: "审查 Swift / iOS diff、风险与 public API 设计"
  default_prompt: >-
    使用 $code-review 对当前 iOS / Swift 改动做静态审查，按严重度输出 findings 与风险，不把静态结论包装成已复现的运行时问题；把“关键注释缺失或误导”纳入阻塞判定：`public/open` API 缺 `///` 文档注释、并发/副作用/失败语义缺失、注释与实现冲突都应进入 blocking。输出必须包含 `blocking_findings`、`non_blocking_findings`、`first_failure`、`next_action`；其中 `blocking_findings` 只放真实阻塞项，无阻塞时写 `blocking_findings: []` 与 `first_failure: none`，且存在阻塞项时 `next_action` 不能是 `complete`。如果当前任务属于非编排 / 单 Agent 的实现链路，本阶段默认承接 $testing 之后的第三步，默认审查当前 unstaged + untracked 工作区改动；若存在 staged 改动，应显式指出其偏离默认输入假设。无 blocking findings 时才继续进入 $final-evidence-gate。；若验证故事证据不足或高风险，应建议进入 $verify-ios-build。

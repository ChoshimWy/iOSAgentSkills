interface:
  display_name: "iOS 代码审查"
  short_description: "审查 Swift / iOS diff、风险与 public API 设计"
  default_prompt: >-
    使用 $code-review 对当前 iOS / Swift 本次任务全量差异与直接影响面做静态审查；默认纳入 staged、unstaged、untracked，以及任务起点基线之后的相关提交，并在无法确认基线时声明 fallback。按严重度输出 findings 与风险，不把静态结论包装成已复现的运行时问题；把“关键注释缺失或误导”纳入阻塞判定：`public/open` API 缺 `///` 文档注释、并发/副作用/失败语义缺失、注释与实现冲突都应进入 blocking。输出必须包含 `review_scope`、`impact_scope`、`unreviewed_changes`、`blocking_findings`、`non_blocking_findings`、`first_failure`、`next_action`；其中 `blocking_findings` 只放真实阻塞项，无阻塞时写 `blocking_findings: []`、`unreviewed_changes: none` 与 `first_failure: none`，且存在阻塞项时 `next_action` 不能是 `complete`。如果当前任务属于非编排 / 单 Agent 的实现链路，本阶段默认承接 $testing 之后的第三步；无 blocking findings 即可按默认标准收口；若验证故事证据不足、高风险或存在未审查影响面，应建议进入 $verify-ios-build。

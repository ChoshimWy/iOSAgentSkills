interface:
  display_name: "iOS 代码审查"
  short_description: "审查 Swift / iOS diff、风险与 public API 设计"
  default_prompt: >-
    使用 $code-review 对当前 iOS / Swift 本次任务全量差异与直接影响面做静态审查；默认纳入 staged、unstaged、untracked，以及任务起点基线之后的相关提交，并在无法确认基线时声明 fallback。按严重度输出 findings 与风险，不把静态结论包装成已复现的运行时问题；把“关键注释缺失或误导”纳入阻塞判定：`public/open` API 缺 `///` 文档注释、并发/副作用/失败语义缺失、注释与实现冲突都应进入 blocking。输出必须包含 `review_scope`、`impact_scope`、`unreviewed_changes`、`blocking_findings`、`non_blocking_findings`、`first_failure`、`next_action`；其中 `blocking_findings` 只放真实阻塞项，无阻塞时写 `blocking_findings: []`、`unreviewed_changes: none` 与 `first_failure: none`，且存在阻塞项时 `next_action` 不能是 `complete`。本阶段默认以独立 reviewer subAgent 身份执行；如果当前任务属于实现链路收口审查，必须由未参与实现的独立 reviewer subAgent 承接 $testing 之后的第三步；同一 Agent 自审无效，无法确认独立性时输出 blocked；若 `testing` 已执行最窄定向单测且本次改动未命中工程/依赖/签名/资源/设备能力高风险条件，不得仅因未跑真机 / 模拟器验证就判证据不足。若本次修改涉及私有库 / 私有组件，还必须审查验证是否在主项目本地 `:path` 私有库依赖基线完成；未收到明确指令却使用线上版本化依赖或 `Pods/` 快照验证，应视为验证基线不成立。若验证故事证据不足、高风险或存在未审查影响面，应建议先进入 $final-evidence-gate，再按需升级 $verify-ios-build。

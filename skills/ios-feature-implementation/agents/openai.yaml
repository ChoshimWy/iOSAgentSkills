interface:
  display_name: "iOS Feature 实现"
  short_description: "通用 iOS feature 业务实现、导航接线与按需验证"
  default_prompt: >-
    使用 $ios-feature-implementation 处理与具体 UI 技术栈无关的 iOS 业务层代码：service、repository、use case、view model、依赖注入与导航接线。实现阶段输出必须包含 `changed_files`、`summary`、`known_risks`，并且 `test_impact` 与 `no_test_reason` 二选一必填。如果当前任务未进入多 Agent 编排，或当前轮只能以单 Agent 执行，实现完成后默认按三步收口：$ios-feature-implementation -> $testing/定向验证 -> $code-review；其中 $testing 阶段默认只执行最窄定向单测，若不新增测试代码或没有可低成本执行的单测路径，也要明确给出 `no_test_reason`、`suggested_validation` 与验证依据，不自动升级到真机 / 模拟器验证；随后由 $code-review 审查本次任务全量差异与直接影响面，没有 blocking findings 即可按默认标准收口。若本次修改涉及私有库 / 私有组件，主项目默认切回或保持本地 `:path` 私有库依赖进行开发与验证；除非用户明确要求，不切到线上版本化依赖或 `Pods/` 快照验证。若任务产出修改了 Apple Xcode 项目相关内容，默认以定向测试/必要验证与 $code-review 放行为收口；$final-evidence-gate / $verify-ios-build 仅在用户显式要求或需要补强完整项目环境证据时按需使用。

interface:
  display_name: "iOS 统一实施"
  short_description: "单入口处理 iOS 业务、SwiftUI、UIKit、Swift 进阶与重构实施"
  default_prompt: >-
    使用 $ios-feature-implementation 作为所有 iOS 代码实施的统一入口；先根据本地项目事实选择 implementation_mode：business、swiftui、uikit、mixed-ui、advanced-swift、refactor 或 sdk-contract，再执行最小可验证改动。实现阶段输出必须包含 changed_files、summary、known_risks，并且 test_impact 与 no_test_reason 二选一必填；涉及 UI 时补充 state/navigation/layout/lifecycle 等模式化说明，涉及高级 Swift 时补充 API boundary / concurrency invariants。实现完成后默认按 $testing/定向验证与独立 reviewer subAgent($code-review) 收口，不能由实现 Agent 自审；$testing 阶段默认只执行最窄定向单测，没有低成本单测路径时明确 no_test_reason 与 suggested_validation，不自动升级真机/模拟器。若本次修改涉及私有库 / 私有组件，主项目默认保持本地 :path 私有库依赖进行开发与验证。$final-evidence-gate / $verify-ios-build 仅在用户显式要求、发布前、高风险或需要补强完整项目环境证据时按需使用。

interface:
  display_name: "iOS 统一实施"
  short_description: "单入口处理 iOS 业务、UI、测试代码、SDK 架构与重构"
  default_prompt: >-
    使用 $ios-feature-implementation 作为所有 iOS 生产代码与测试代码实施的统一入口；先根据本地项目事实选择 implementation_mode：business、swiftui、liquid-glass、uikit、mixed-ui、advanced-swift、refactor、sdk-contract 或 test-implementation，再执行最小可验证改动。测试代码编写、Mock/Stub/Spy/Fake、fixture、Page Object 和最小 testability seam 使用 test-implementation；验证执行、日志摘要与最终证据裁决仍交给验证链路。实现阶段输出必须包含 changed_files、summary、known_risks，并且 test_impact 与 no_test_reason 二选一必填；涉及测试时补充 test_changes，涉及 UI 时补充 state/navigation/layout/lifecycle 等模式化说明，涉及 Liquid Glass 时补充 recommended_api_usage 与 fallback_strategy，涉及 SDK / Public API 时补充 public_api_surface / module_boundaries / distribution_plan。实现完成后默认按定向验证/no_test_reason 与独立 reviewer subAgent($code-review) 收口，不能由实现 Agent 自审；没有低成本单测路径时明确 no_test_reason 与 suggested_validation，不自动升级真机/模拟器。若本次修改涉及私有库 / 私有组件，主项目默认保持本地 :path 私有库依赖进行开发与验证。$ios-verification 仅在用户显式要求、发布前、高风险、需要执行定向验证或需要补强完整项目环境证据时按需使用。

interface:
  display_name: "iOS 测试编写"
  short_description: "补齐单元测试、UI 测试与测试替身设计并保留按需验证要求"
  default_prompt: >-
    使用 $testing 为当前 iOS / macOS 代码编写或补齐单元测试、UI 测试与测试替身；如果当前任务属于非编排 / 单 Agent 的实现链路，本阶段默认承接实现后的第二步。输出必须包含 `suggested_validation`、`executed_validation`、`failure_attribution`、`needs_test_code`、`first_failure`；若当前改动不适合新增测试代码，也要明确给出 `no_test_reason` 与验证依据，然后进入 $code-review，由该阶段审查本次任务全量差异与直接影响面，没有 blocking findings 即可按默认标准收口。若本次修改涉及私有库 / 私有组件，定向验证默认在主项目切回或保持本地 `:path` 私有库依赖后执行，除非用户明确要求，不切到线上版本化依赖或 `Pods/` 快照验证。若需要实际执行定向测试而用户未显式指定 scheme，默认优先选择绑定了单元测试 `*Tests` target / bundle 的 scheme；若不存在，再回退到其它测试 scheme（例如 `*UITests`、`*_TEST`）；$final-evidence-gate / $verify-ios-build 仅按需使用；如果同一任务后续按需进入完整验证，可选验证默认在目标项目的项目环境复用同一套 workspace / scheme / destination 基线，并继续优先 `.xcworkspace`。

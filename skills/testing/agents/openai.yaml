interface:
  display_name: "iOS 测试编写"
  short_description: "补齐单元测试、UI 测试与测试替身设计并保留门禁要求"
  default_prompt: "使用 $testing 为当前 iOS / macOS 代码编写或补齐单元测试、UI 测试与测试替身；如果当前任务属于非编排 / 单 Agent 的实现链路，本阶段默认承接 $code-review 后的第三步；若当前改动不适合新增测试代码，也要明确给出 no_test_reason 与验证依据，再进入 $verify-ios-build。若需要实际执行定向测试而用户未显式指定 scheme，默认优先选择绑定了单元测试 `*Tests` target / bundle 的 scheme；若不存在，再回退到其它测试 scheme（例如 `*UITests`、`*_TEST`）；如果同一任务后续还要执行 $verify-ios-build，最终门禁默认在目标项目的项目环境复用同一套 workspace / scheme / destination 基线，并继续优先 `.xcworkspace`。"

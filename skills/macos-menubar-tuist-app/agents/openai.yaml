interface:
  display_name: "macOS 菜单栏 Tuist 应用"
  short_description: "仅限 Tuist 菜单栏 Xcode 工程实现、重构与验证"
  default_prompt: "使用 $macos-menubar-tuist-app 构建、重构或审查基于 Tuist 的 macOS 菜单栏应用，并保持 `LSUIElement`、分层状态架构与脚本化运行校验；若任务修改了 Xcode 工程内容，默认以定向测试/必要验证与 $code-review 放行为收口；$final-evidence-gate / $verify-ios-build 仅在用户显式要求或需要补强完整项目环境证据时按需使用。"

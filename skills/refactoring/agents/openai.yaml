interface:
  display_name: "代码重构"
  short_description: "处理长方法、重复逻辑、深层嵌套与通用结构重构流程要求"
  default_prompt: "使用 $refactoring 处理长方法、重复代码、深层嵌套、回调地狱和 God Object 等通用代码异味重构；若任务产出修改了 Apple Xcode 项目相关内容，收尾必须切到 $verify-ios-build，并在目标项目的项目环境完成最终验证：iOS 项目若同时存在 `.xcworkspace` 与 `.xcodeproj` 必须优先 `.xcworkspace`，默认优先已连接真机，找不到连接中的真机时再回退到 simulator。"

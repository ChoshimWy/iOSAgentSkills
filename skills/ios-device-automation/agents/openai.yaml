interface:
  display_name: "iOS 真机自动化"
  short_description: "在连接中的真机上执行构建、安装、启动与测试流程验证"
  default_prompt: "使用 $ios-device-automation 在连接中的 iPhone 或 iPad 真机上选择目标设备，并执行 build/test、安装、启动或诊断流程；若用户未显式指定 scheme，默认优先选择绑定了单元测试 `*Tests` target / bundle 的 scheme；若不存在，再回退到其它测试 scheme（例如 `*UITests`、`*_TEST`）；如果同一任务后续还要执行 $verify-ios-build，最终门禁默认在目标项目的项目环境复用同一套 workspace / scheme / destination 基线，并继续优先 `.xcworkspace`。"

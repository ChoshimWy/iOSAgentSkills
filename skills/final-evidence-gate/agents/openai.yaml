interface:
  display_name: "最终证据门禁"
  short_description: "Apple Xcode 项目改动后的条件化最终证据裁决"
  default_prompt: >-
    使用 $final-evidence-gate 对 Apple Xcode 项目改动做完成态裁决。优先复用最后一次代码变更之后已成功的目标项目环境 xcodebuild test/build 证据；只有在证据不足、高风险或命中工程/依赖/签名/资源打包类改动时，才升级到 $verify-ios-build。在 gate 接受证据或 verify 成功之前，不得把任务表述为已完成。

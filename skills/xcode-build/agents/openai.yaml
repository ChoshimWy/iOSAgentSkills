interface:
  display_name: "Xcode 构建配置"
  short_description: "处理 Build Settings、签名、Archive 与 CI/CD 并保留按需验证"
  default_prompt: "使用 $xcode-build 处理当前 Xcode 工程的 Build Settings、签名、Archive/Export、CI/CD 或构建脚本；实现完成后默认以定向测试/必要验证与 $code-review 放行为收口；$final-evidence-gate / $verify-ios-build 仅在用户显式要求或需要补强完整项目环境证据时按需使用。"

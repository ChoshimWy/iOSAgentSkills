interface:
  display_name: "Xcode 构建配置"
  short_description: "处理 Build Settings、签名、Archive 与 CI/CD 并保留门禁"
  default_prompt: "使用 $xcode-build 处理当前 Xcode 工程的 Build Settings、签名、Archive/Export、CI/CD 或构建脚本；实现完成后仍必须进入 $final-evidence-gate；证据不足、高风险或命中工程/依赖/签名/资源打包类改动时，再切到 $verify-ios-build 做最终验证，并在项目环境执行：优先 `.xcworkspace`、默认优先已连接真机、找不到连接中的真机时回退到 simulator。"

interface:
  display_name: "iOS 按需构建验证"
  short_description: "按需项目环境构建验证：项目环境、.xcworkspace 优先与真机优先"
  default_prompt: "使用 $verify-ios-build 处理 Apple Xcode 工程收尾阶段的可选验证：在前置 $testing 与 $code-review 都已放行后，于目标项目的项目环境执行按需验证；本 skill 不作为 `testing` 的默认后继步骤，默认 testing 不会自动触发真机 / 模拟器验证。所有本地 xcodebuild（含 -list/-showdestinations/build/test）都必须通过 functions.exec_command + sandbox_permissions=\\\"require_escalated\\\" 在非沙盒项目环境执行；如果同一任务里已经先跑过定向测试，可选证据验证默认复用同一套 workspace / scheme / destination 基线，并继续优先 `.xcworkspace`；若本次修改涉及私有库 / 私有组件，项目环境验证默认使用主项目本地 `:path` 私有库依赖，除非用户明确要求，不回切线上版本化依赖或 `Pods/` 快照验证；若用户未显式指定 scheme，默认优先选择绑定了单元测试 `*Tests` target / bundle 的 scheme；若不存在，再回退到其它测试 scheme（例如 `*UITests`、`*_TEST`）；本地缓存统一走 Xcode 默认 DerivedData（`~/Library/Developer/Xcode/DerivedData`），不允许 XCODE_DERIVED_DATA 覆盖；iOS 项目默认优先已连接真机，找不到连接中的真机时回退到 simulator；若验证未完成或失败，明确完整验证失败点与残余风险。"

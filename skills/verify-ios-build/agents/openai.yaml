interface:
  display_name: "iOS 按需构建验证"
  short_description: "按需项目环境构建验证：项目环境、.xcworkspace 优先与真机优先"
  default_prompt: "使用 $verify-ios-build 处理 Apple Xcode 工程收尾阶段的可选验证：在前置 $testing 与 $code-review 都已放行后，于目标项目的项目环境执行按需验证；本 skill 不作为 `testing` 的默认后继步骤，默认 testing 不会自动触发真机 / 模拟器验证。所有本地 xcodebuild 参数探测与验证（含 -list/-showdestinations/build/test）都必须由主 Agent 通过 functions.exec_command + sandbox_permissions=\\\"require_escalated\\\" 启动目标项目根目录 `codex_verify.sh`，若项目未接入则回退到 `~/.codex/bin/codex_verify`；不得直接调用 xcodebuild 二进制，也不要让多个 Agent 各自裸跑 xcodebuild。若 `--queue-status`、wrapper 输出或 `build.db is locked` 表明已有其他 Agent 正在验证，当前 Agent 必须等待 shared build-queue daemon 串行出队，或把本轮标记为 `env_issue` / `blocked`；不得为了绕过同一个 `build.db` 锁而切到单独 `-derivedDataPath` 继续跑同一组验证。验证 wrapper 默认接入 shared build-queue daemon，把验证型 xcodebuild 串行排队执行，统一使用系统 DerivedData，并默认只把脚本生成的 verification-report.json 等结构化摘要交给 Agent；如果同一任务里已经先跑过定向测试，可选证据验证默认复用同一套 workspace / scheme / destination 基线，并继续优先 `.xcworkspace`；若本次修改涉及私有库 / 私有组件，项目环境验证默认使用主项目本地 `:path` 私有库依赖，除非用户明确要求，不回切线上版本化依赖或 `Pods/` 快照验证；若用户未显式指定 scheme，默认优先选择绑定了单元测试 `*Tests` target / bundle 的 scheme；若不存在，再回退到其它测试 scheme（例如 `*UITests`、`*_TEST`）；iOS 项目默认优先已连接真机，找不到连接中的真机时回退到 simulator；若验证未完成或失败，明确完整验证失败点与残余风险。"

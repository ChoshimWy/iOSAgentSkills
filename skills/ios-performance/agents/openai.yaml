interface:
  display_name: "iOS 性能分析"
  short_description: "统一处理 benchmark、xctrace 与性能回归门禁"
  default_prompt: "使用 $ios-performance 分析当前 iOS 功能的掉帧、启动慢、CPU / 内存压力或性能回归，并给出 XCTest 指标与 xctrace / Instruments 取证方案；若任务产出修改了 Apple Xcode 项目相关内容，默认以定向测试/必要验证与独立 reviewer subAgent 执行的 $code-review 放行为收口；$ios-verification / $ios-verification 仅在用户显式要求或需要补强完整项目环境证据时按需使用。若需要正式 HTML 性能报告或 handoff 文档，最终文档生成交给 $html-docs。"

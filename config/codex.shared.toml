# Shared Codex defaults that are safe to version and reuse across devices.
# Keep machine-local state (auth/history/sessions/cache/memories files/projects trust)
# in ~/.codex/config.toml only; do not add them here.

model = "gpt-5.4"
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"
service_tier = "fast"

memories.use_memories = true
memories.generate_memories = true

[features]
multi_agent = true
memories = true

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[mcp_servers.openaiDeveloperDocs.tools.search_openai_docs]
approval_mode = "approve"

[mcp_servers.appleDeveloperDocs]
command = "npx"
args = ["-y", "@kimsungwhee/apple-docs-mcp@latest"]

[tui]
status_line = ["model-with-reasoning", "used-tokens", "project-root", "context-remaining"]

[plugins."build-ios-apps@openai-curated"]
enabled = true

[plugins."build-macos-apps@openai-curated"]
enabled = true

[plugins."figma@openai-curated"]
enabled = true

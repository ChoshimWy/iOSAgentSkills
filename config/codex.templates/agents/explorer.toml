name = "explorer"
role = "context-gatherer"
description = "收集上下文、定位文件、梳理依赖与风险，不做实现改动。"

[model]
reasoning_effort = "medium"

[permissions]
filesystem = "read-only"
network = "restricted"

[output_contract]
required_fields = [
  "findings",
  "candidate_files",
  "risks",
  "validation_baseline",
  "checkpoint_status",
  "first_failure",
  "next_action"
]

[developer_instructions]
text = "搜索优先 rg；输出只保留关键证据和路径，不粘贴大段日志；无阻塞时 first_failure 写 none。"
